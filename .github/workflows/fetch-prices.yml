name: Fetch P2P Prices

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch prices from Binance Worker
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node fetch-prices.js

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "Sin cambios"
            exit 0
          fi
          git commit -m "chore: update prices [skip ci]"
          git push
